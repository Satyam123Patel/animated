<svg xmlns="http://www.w3.org/2000/svg" width="400" height="450" viewBox="0 0 400 450">
  <defs>
    <!-- Background Sweep Gradient -->
    <linearGradient id="bg-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#073a2b" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#0b132b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1c1d24" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Moving Spotlight Radial Gradient -->
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#0066ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Rotating Avatar Border Gradient -->
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55e7fc"/>
      <stop offset="50%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#55e7fc"/>
    </linearGradient>

    <!-- Clip Path for circular avatar image -->
    <clipPath id="avatar-image-clip">
      <circle cx="0" cy="0" r="45"/>
    </clipPath>

    <!-- Style definition -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;display=swap');
      .font-mono {
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
      }
    </style>
  </defs>

  <!-- Clip Path to keep background light inside card -->
  <clipPath id="card-clip">
    <rect x="12" y="12" width="376" height="426" rx="22"/>
  </clipPath>

  <!-- Card Base -->
  <rect x="10" y="10" width="380" height="430" rx="24" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="11" y="11" width="378" height="428" rx="23" fill="url(#bg-glow)"/>

  <!-- Moving Light Effect in Background -->
  <g clip-path="url(#card-clip)">
    <circle cx="200" cy="220" r="280" fill="url(#spotlight)">
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        values="-150,-150; 150,150; -150,150; 150,-150; -150,-150" 
        dur="18s" 
        repeatCount="indefinite"
      />
    </circle>
  </g>

  <!-- Avatar Group -->
  <g transform="translate(200, 110)">
    <!-- Rotating Ring -->
    <circle cx="0" cy="0" r="50" stroke="url(#avatar-grad)" stroke-width="3" fill="none">
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0" 
        to="360" 
        dur="6s" 
        repeatCount="indefinite"
      />
    </circle>
    
    <!-- Outer Glow Rings -->
    <circle cx="0" cy="0" r="56" stroke="#30363d" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="0" cy="0" r="62" stroke="#30363d" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Avatar Image (GitHub Profile Photo) -->
    <image href="https://github.com/Satyam123Patel.png" x="-45" y="-45" width="90" height="90" clip-path="url(#avatar-image-clip)"/>
  </g>

  <!-- Stats List -->
  <g transform="translate(40, 220)" fill="#8b949e" font-size="16" class="font-mono">
    
    <!-- Name Row -->
    <text x="0" y="20">name</text>
    <text x="320" y="20" fill="#c9d1d9" text-anchor="end">Satyam</text>
    <line x1="0" y1="35" x2="320" y2="35" stroke="#21262d" stroke-dasharray="4 4"/>

    <!-- Role Row -->
    <text x="0" y="70">role</text>
    <text x="320" y="70" fill="#c9d1d9" text-anchor="end">full-stack dev</text>
    <line x1="0" y1="85" x2="320" y2="85" stroke="#21262d" stroke-dasharray="4 4"/>

    <!-- Location Row -->
    <text x="0" y="120">location</text>
    <text x="320" y="120" fill="#c9d1d9" text-anchor="end">remote / earth</text>
    <line x1="0" y1="135" x2="320" y2="135" stroke="#21262d" stroke-dasharray="4 4"/>

    <!-- Status Row -->
    <text x="0" y="170">status</text>
    <!-- Pulsing Green Dot + Online Text -->
    <g transform="translate(320, 170)">
      <text x="-18" y="0" fill="#56d364" text-anchor="end">online</text>
      <circle cx="-6" cy="-5" r="4" fill="#56d364"/>
      <circle cx="-6" cy="-5" r="7" fill="none" stroke="#56d364" stroke-width="1.5" opacity="0.7">
        <animate attributeName="r" values="4;10" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <line x1="0" y1="185" x2="320" y2="185" stroke="#21262d" stroke-dasharray="4 4"/>

    <!-- Coffee Row -->
    <text x="0" y="220">coffee</text>
    <text x="320" y="220" fill="#c9d1d9" text-anchor="end">∞</text>
  </g>
</svg>
